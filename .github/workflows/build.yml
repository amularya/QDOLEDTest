name: Build Windows executable

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure Visual Studio build
        run: cmake -S . -B build -A x64

      - name: Build release executable
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package portable download
        shell: pwsh
        run: |
          $package = "dist/QDOLEDTextTuner-win-x64"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          Copy-Item "build/Release/QDOLEDTextTuner.exe" $package
          Copy-Item "README.md" $package
          Compress-Archive -Path "$package/*" -DestinationPath "dist/QDOLEDTextTuner-win-x64.zip"
          (Get-FileHash "dist/QDOLEDTextTuner-win-x64.zip" -Algorithm SHA256).Hash.ToLower() |
            Set-Content "dist/QDOLEDTextTuner-win-x64.zip.sha256"

      - name: Upload ready-to-run executable
        uses: actions/upload-artifact@v4
        with:
          name: QDOLEDTextTuner-win-x64
          path: |
            dist/QDOLEDTextTuner-win-x64/**
            dist/QDOLEDTextTuner-win-x64.zip
            dist/QDOLEDTextTuner-win-x64.zip.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: QDOLEDTextTuner-win-x64
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/QDOLEDTextTuner-win-x64.zip \
              dist/QDOLEDTextTuner-win-x64.zip.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/QDOLEDTextTuner-win-x64.zip \
              dist/QDOLEDTextTuner-win-x64.zip.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --generate-notes \
              --title "QD-OLED Text Tuner ${GITHUB_REF_NAME}"
          fi
